{% extends 'base.html' %}

{% block content %}
<section class="auth-card">
    <h1>Регистрация</h1>
    <form method="post" class="auth-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn" type="submit">Создать аккаунт</button>
    </form>
    <p class="muted">Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a></p>
</section>
{% endblock %}
