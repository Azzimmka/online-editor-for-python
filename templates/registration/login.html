{% extends 'base.html' %}

{% block content %}
<section class="auth-card">
    <h1>Вход</h1>
    <form method="post" class="auth-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn" type="submit">Войти</button>
    </form>
    <p class="muted">Нет аккаунта? <a href="{% url 'register' %}">Регистрация</a></p>
</section>
{% endblock %}
